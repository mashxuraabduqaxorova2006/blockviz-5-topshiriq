<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlockViz | Blockchain Simulator | 5-topshiriq</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&display=swap');
        
        :root {
            --bg: #0b0e14;
            --green: #00ff88;
            --green-glow: rgba(0, 255, 136, 0.2);
            --border: #1a1f29;
            --text: #e1e7f0;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg);
            color: var(--text);
            padding: 40px;
            overflow-x: hidden;
        }

        header { text-align: center; margin-bottom: 60px; }
        h1 { font-size: 2.5rem; color: var(--green); letter-spacing: -2px; }
        p { color: #6b7280; margin-top: 10px; }

        .blockchain {
            display: flex;
            gap: 40px;
            overflow-x: auto;
            padding: 20px 0;
            scroll-behavior: smooth;
        }

        .block {
            min-width: 320px;
            background: #151921;
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            position: relative;
            transition: 0.3s;
        }
        .block.valid { border-color: var(--green); box-shadow: 0 0 20px var(--green-glow); }

        .block-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .block-num { font-weight: 800; color: var(--green); }
        .block-time { font-size: 0.7rem; color: #4b5563; }

        .field { margin-bottom: 16px; }
        .label { font-size: 0.65rem; color: #4b5563; text-transform: uppercase; margin-bottom: 4px; }
        .value { font-size: 0.8rem; background: #0b0e14; padding: 8px 12px; border-radius: 8px; word-break: break-all; }

        .input-box {
            width: 100%;
            background: #0b0e14;
            border: 1px solid var(--border);
            color: var(--green);
            padding: 10px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.8rem;
        }

        .connector {
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: var(--border);
        }

        .controls {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(21, 25, 33, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px 30px; border-radius: 50px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn {
            background: var(--green); color: #000;
            padding: 10px 24px; border-radius: 50px;
            border: none; font-weight: 800; cursor: pointer;
            font-family: inherit;
        }
    </style>
</head>
<body>

    <header>
        <h1>BlockViz v1.0</h1>
        <p>Blockchain qanday ishlashini real vaqtda kuzating.</p>
    </header>

    <div class="blockchain" id="chain">
        <!-- Bloklar shu yerda chiqadi -->
    </div>

    <div class="controls">
        <button class="btn" id="addBlock">Yangi Blok Qo'shish</button>
    </div>

    <script>
        const chainEl = document.getElementById('chain');
        const addBtn = document.getElementById('addBlock');

        let blocks = [
            { id: 1, data: 'Genesis Block', prev: '0000000000000000000000', hash: '0000af837d92c7d92837d9' }
        ];

        function render() {
            chainEl.innerHTML = '';
            blocks.forEach((b, i) => {
                const blockDiv = document.createElement('div');
                blockDiv.className = 'block valid';
                blockDiv.innerHTML = `
                    <div class="block-header">
                        <span class="block-num">BLOCK #${b.id}</span>
                        <span class="block-time">${new Date().toLocaleTimeString()}</span>
                    </div>
                    <div class="field">
                        <div class="label">DATA</div>
                        <input class="input-box" value="${b.data}">
                    </div>
                    <div class="field">
                        <div class="label">PREVIOUS HASH</div>
                        <div class="value">${b.prev}</div>
                    </div>
                    <div class="field">
                        <div class="label">HASH</div>
                        <div class="value" style="color:var(--green)">${b.hash}</div>
                    </div>
                `;
                chainEl.appendChild(blockDiv);
                
                if (i < blocks.length - 1) {
                    const conn = document.createElement('div');
                    conn.className = 'connector';
                    conn.innerText = '→';
                    chainEl.appendChild(conn);
                }
            });
            chainEl.scrollLeft = chainEl.scrollWidth;
        }

        addBtn.addEventListener('click', () => {
            const last = blocks[blocks.length - 1];
            const nid = last.id + 1;
            blocks.push({
                id: nid,
                data: `Transaction Data #${nid}`,
                prev: last.hash,
                hash: Math.random().toString(16).substring(2, 24).padStart(22, '0')
            });
            render();
        });

        render();
    </script>
</body>
</html>
